[workspace]
authors = ["Rohit Goswami <rgoswami@ieee.org>"]
channels = ["conda-forge"]
description = "C ABI for embedding NWChem with Cap'n Proto parameters."
name = "nwchemc"
platforms = ["linux-64", "osx-64", "osx-arm64"]
version = "1.1.0"

[environments]
docs = { features = ["docs"] }

[dependencies]
capnproto = ">=1.0.2,<2"
cmocka = ">=1.1.7,<3"
cmake = ">=3.30.4,<4"
compilers = ">=1.8.0,<2"
fortran-compiler = ">=1.8.0,<2"
meson = ">=1.5.2,<2"
pkgconf = ">=2.5.1,<3"
python = ">=3.10,<4"

[feature.docs]
platforms = ["linux-64"]

[feature.docs.dependencies]
doxygen = ">=1.13.2,<2"
doxyrest = ">=2.1.2,<3"
emacs = ">=30.2,<31"
pandoc = ">=3.1,<4"
sphinx = ">=8.0,<9"

[feature.docs.pypi-dependencies]
myst-parser = ">=4.0,<5"
shibuya = ">=2026.1.9,<2027"
sphinx-sitemap = ">=2.9.0,<3"

[tasks]
test-stub = { cmd = "meson setup build -Dwith_tests=true && meson test -C build --print-errorlogs", description = "Configure and test the stub/parser build" }
release-assert = { cmd = "python3 scripts/release_assert.py", description = "Verify release metadata versions agree" }
towncrier-draft = { cmd = "uvx towncrier build --draft", description = "Preview changelog fragments" }
release-cog-dry = { cmd = "cog bump --auto --dry-run", description = "Preview the release bump" }

[feature.docs.tasks.mkrst]
cmd = "emacs --batch --load export.el"
cwd = "docs"
description = "Export docs/orgmode to docs/source RST"

[feature.docs.tasks.doxybuild]
cmd = "doxygen Doxyfile_nwchemc.cfg && doxyrest -c doxyrest-config.lua"
cwd = "docs/source"
description = "Generate C/Fortran XML and convert it to Sphinx RST"

[feature.docs.tasks.sphinxbld]
cmd = "sphinx-build -d docs/doctrees docs/source docs/build"
depends-on = ["mkrst", "doxybuild"]
description = "Build the Sphinx HTML documentation"

[feature.docs.tasks.docbld]
depends-on = ["sphinxbld"]
description = "Build the full documentation site"
