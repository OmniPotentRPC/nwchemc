[workspace]
authors = ["Rohit Goswami <rgoswami@ieee.org>"]
channels = ["conda-forge"]
description = "C ABI for embedding NWChem with Cap'n Proto parameters."
name = "nwchemc"
platforms = ["linux-64", "osx-64", "osx-arm64"]
version = "1.2.0"

[environments]
docs = { features = ["docs"] }
nwchem-runtime = { features = ["nwchem-runtime"] }

[dependencies]
capnproto = ">=1.0.2,<2"
cmocka = ">=1.1.7,<3"
cmake = ">=3.30.4,<4"
compilers = ">=1.8.0,<2"
fortran-compiler = ">=1.8.0,<2"
fprettify = ">=0.3.7,<1"
meson = ">=1.5.2,<2"
pkgconf = ">=2.5.1,<3"
python = ">=3.10,<4"

[feature.docs]
platforms = ["linux-64"]

[feature.docs.dependencies]
doxygen = ">=1.13.2,<2"
doxyrest = ">=2.1.2,<3"
emacs = ">=30.2,<31"
pandoc = ">=3.1,<4"
sphinx = ">=8.0,<9"

[feature.docs.pypi-dependencies]
myst-parser = ">=4.0,<5"
shibuya = ">=2026.1.9,<2027"
sphinx-sitemap = ">=2.9.0,<3"

[tasks]
test-stub = { cmd = "meson setup build -Dwith_tests=true && meson test -C build --print-errorlogs", description = "Configure and test the stub/parser build" }
test-cmocka = { cmd = "meson setup build -Dwith_tests=true && meson test -C build --suite cmocka --print-errorlogs", description = "Run cmocka and inventory suites" }
inventory-check = { cmd = "python3 tools/check_feature_inventory.py", description = "Cross-check intern inventory vs schema" }
inventory-gen = { cmd = "python3 tools/gen_feature_inventory.py .", description = "Regenerate inventory JSON and C intern tables" }
release-assert = { cmd = "python3 scripts/release_assert.py", description = "Verify release metadata versions agree" }
towncrier-draft = { cmd = "uvx towncrier build --draft", description = "Preview changelog fragments" }
release-cog-dry = { cmd = "cog bump --auto --dry-run", description = "Preview the release bump" }
prek-validate = { cmd = "prek validate-config prek.toml", description = "Validate prek/pre-commit config" }
prek = { cmd = "prek run --all-files", description = "Run all prek hooks on the tree" }
prek-install = { cmd = "prek install", description = "Install prek git hooks in this clone" }
lychee = { cmd = "bash -c 'lychee --config .lychee.toml README.md docs/newsfragments/*.md docs/orgmode/**/*.org 2>/dev/null || lychee --config .lychee.toml README.md $(find docs/orgmode docs/newsfragments -type f \\( -name \"*.org\" -o -name \"*.md\" \\) 2>/dev/null)'", description = "Link-check owned docs/README" }
fortran-lint = { cmd = "bash -c 'for f in src/*.f90 src/*.F; do [ -f \"$f\" ] || continue; fprettify --diff \"$f\" >/dev/null || { echo \"fprettify would change $f\"; exit 1; }; done'", description = "Fortran fprettify check on src/" }
coverage = { cmd = "bash tools/run_coverage.sh build-coverage", description = "Instrumented stub tests + lcov summary" }
test-nwchem-compare = { cmd = "python3 tools/compare_nwchem_cli.py --out-dir build/nwchem-cli-ref", description = "CLI integration tasks (nwchem on PATH; optional --embed-build)" }
test-nwchem-compare-embed = { cmd = "python3 tools/compare_nwchem_cli.py --out-dir build/nwchem-compare-embed --embed-build build-nwchem", description = "CLI + embed delta compare when build-nwchem exists" }
test-integration-matrix = { cmd = "python3 -c \"import json;from pathlib import Path;m=json.loads(Path('tests/integration/task_matrix.json').read_text());print('tasks',len(m['tasks']));assert m['tasks']\"", description = "Validate integration task_matrix.json structure" }
debug-backtrace-smoke = { cmd = "bash -c 'meson setup build -Dwith_tests=true && meson compile -C build nwchemc_feature_driver && (NWCHEMC_DEBUG=1 ./build/nwchemc_feature_driver inventory >/dev/null) && (! ./build/nwchemc_feature_driver crash-test 2>build/crash-test.err); grep -q nwchemc_debug build/crash-test.err && grep -q backtrace build/crash-test.err'", description = "Smoke: driver installs debug handlers; crash-test prints backtrace" }

[feature.nwchem-runtime]
# conda-forge nwchem executable for CLI integration/compare only — NOT embed SDK.
platforms = ["linux-64"]

[feature.nwchem-runtime.dependencies]
nwchem = ">=7.2.0,<8"

[feature.nwchem-runtime.tasks.test-nwchem-compare]
cmd = "python3 tools/compare_nwchem_cli.py --out-dir build/nwchem-cli-ref --require-cli"
description = "CLI integration tasks with required nwchem on PATH"

[feature.docs.tasks.mkrst]
cmd = "emacs --batch --load export.el"
cwd = "docs"
description = "Export docs/orgmode to docs/source RST"

[feature.docs.tasks.doxybuild]
cmd = "doxygen Doxyfile_nwchemc.cfg && doxyrest -c doxyrest-config.lua"
cwd = "docs/source"
description = "Generate C/Fortran XML and convert it to Sphinx RST"

[feature.docs.tasks.sphinxbld]
cmd = "sphinx-build -d docs/doctrees docs/source docs/build"
depends-on = ["mkrst", "doxybuild"]
description = "Build the Sphinx HTML documentation"

[feature.docs.tasks.docbld]
depends-on = ["sphinxbld"]
description = "Build the full documentation site"
