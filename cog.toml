from_latest_tag = true
ignore_merge_commits = true
disable_changelog = true
disable_bump_commit = false
generate_mono_repository_global_tag = true
tag_prefix = "v"
skip_ci = "[skip ci]"
skip_untracked = false
branch_whitelist = ["main", "master", "release/**"]

pre_bump_hooks = [
    "python3 scripts/release_assert.py --sync {{version}}",
    "uvx towncrier build --yes --version {{version}}",
    "python3 scripts/release_assert.py --require-changelog {{version}}",
]

post_bump_hooks = [
    "git --no-pager show --stat HEAD",
    "echo \"Prepared v{{version}}. Push the version commit and tag 'v{{version}}' to run release workflows.\"",
]

[commit_types]
feat     = { changelog_title = "Features" }
fix      = { changelog_title = "Bug Fixes" }
perf     = { changelog_title = "Performance" }
refactor = { changelog_title = "Refactoring" }
docs     = { changelog_title = "Documentation" }
test     = { changelog_title = "Tests" }
build    = { changelog_title = "Build System" }
ci       = { changelog_title = "CI" }
chore    = { changelog_title = "Miscellaneous" }
style    = { changelog_title = "Style" }
revert   = { changelog_title = "Reverts" }

[changelog]
path = "CHANGELOG.md"
authors = [{ username = "HaoZeke", signature = "Rohit Goswami" }]
