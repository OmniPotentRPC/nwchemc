DOXYFILE_ENCODING      = UTF-8
PROJECT_NAME           = "nwchemc"
PROJECT_NUMBER         = "0.1.0"
PROJECT_BRIEF          = "C ABI for embedding NWChem with Cap'n Proto parameters"
OUTPUT_DIRECTORY       = "."

INPUT                  = "../../include" \
                         "../../src"
FILE_PATTERNS          = *.h \
                         *.c \
                         *.f90 \
                         *.F
RECURSIVE              = YES
EXCLUDE_PATTERNS       = */tests/* \
                         */subprojects/*
EXCLUDE_SYMBOLS        = nwchem_embed_c_api::nwchem_legacy_set_config \
                         nwchem_legacy_set_config

GENERATE_XML           = YES
XML_PROGRAMLISTING     = NO
GENERATE_HTML          = NO
GENERATE_LATEX         = NO
GENERATE_TREEVIEW      = NO

OPTIMIZE_OUTPUT_FOR_C  = YES
EXTRACT_ALL            = NO
EXTRACT_PRIVATE        = NO
EXTRACT_STATIC         = NO
JAVADOC_AUTOBRIEF      = YES
JAVADOC_BANNER         = YES
MARKDOWN_SUPPORT       = YES
INLINE_SOURCES         = YES
SOURCE_BROWSER         = YES
CASE_SENSE_NAMES       = NO
HIDE_UNDOC_RELATIONS   = YES

PREDEFINED             = NWCHEMC_HAS_NWCHEM
